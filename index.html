{font:inherit}.hidden{display:none!important}.logo{background:white center/contain no-repeat var(--logo);border-radius:18px;box-shadow:0 12px 28px rgba(0,0,0,.13)}.gate{min-height:100svh;display:grid;place-items:center;padding:18px}.gate-card{width:min(960px,100%);display:grid;grid-template-columns:.9fr 1.1fr;background:white;border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);overflow:hidden}.hero{background:linear-gradient(135deg,#15241d,#244633);color:white;padding:30px}.hero .logo{width:210px;height:218px;margin-bottom:18px}.hero h1{margin:0;font-size:32px;letter-spacing:-.04em}.hero p{color:rgba(255,255,255,.72);line-height:1.45}.form{padding:30px}.k{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:900}.field{display:grid;gap:7px;margin:12px 0;color:var(--muted);font-size:13px;font-weight:800}input,select{border:1px solid var(--line);border-radius:14px;padding:12px;background:white;min-height:44px}.btn{border:1px solid var(--line);border-radius:13px;background:white;color:var(--ink);padding:10px 13px;font-weight:850;min-height:40px;cursor:pointer}.btn.primary{background:var(--green);color:white;border-color:var(--green)}.btn.red{background:#fff5f5;color:var(--red);border-color:rgba(185,28,28,.18)}.note{border:1px solid rgba(201,138,75,.22);background:#fff8ed;border-radius:14px;padding:11px;color:#8a4f18;font-size:13px;margin-top:12px}.app{display:none}.app.on{display:block}.side{position:fixed;inset:0 auto 0 0;width:var(--side);background:var(--dark);color:white;z-index:20;display:flex;flex-direction:column}.brand{padding:18px;border-bottom:1px solid rgba(255,255,255,.1)}.brand .logo{width:72px;height:76px;margin-bottom:10px}.brand b{display:block}.brand small{color:rgba(255,255,255,.58)}.nav{padding:10px 0;overflow:auto}.nav button{width:100%;border:0;background:transparent;color:rgba(255,255,255,.74);text-align:left;padding:11px 18px;border-right:3px solid transparent}.nav button.active,.nav butto </head><body><section id="gate" class="gate"><div class="gate-card"><div class="hero"><div class="logo"></div><h1>N&J Command Center</h1><p>Demo protegida, limpia y optimizada para móvil. Solo datos falsos.</p></div><div class="form"><div class="k">V5.5.3 Optimized Demo</div><h2>Entrar</h2><label class="field">Usuario<select id="u"><option value="owner">owner@demo.test · Owner/Admin</option><option value="manager">manager@demo.test · Project Manager</option><option value="accountant">accountant@demo.test · Accountant</option><option value="viewer">viewer@demo.test · Viewer</option></select></label><label class="field">Password<input id="p" type="password" value="demo123"></label><button class="btn primary" onclick="login()">Entrar</button><div class="note">Password demo: <b>demo123</b>. PIN demo: <b>2468</b>. No metas datos reales.</div></div></div></section><div id="cover" class="cover" onclick="menu(0)"></div><section id="app" class="app"></section><script>
let role='owner',page='dashboard';const roles={owner:'Owner/Admin',manager:'Project Manager',accountant:'Accountant',viewer:'Viewer'},perm={owner:['all'],manager:['dashboard','properties','projects','contacts','audit'],accountant:['dashboard','transactions','rent','receipts','reports','audit'],viewer:['dashboard','reports']};const can=m=>perm[role].includes('all')||perm[role].includes(m);const money=n=>typeof n==='number'?new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n):n;const rows={properties:[['Oakstone Rental A','Rental','Occupied',2300],['Pinecrest Rental B','Rental','Vacant',1950],['Sample Ridge Flip','Flip','Rehab',0]],projects:[['Oakstone Kitchen Refresh','In Progress','Oakstone Rental A',12000],['Sample Ridge Rehab','Planning','Sample Ridge Flip',42000]],contacts:[['Demo Contact A','Tenant','555-0101'],['Demo Supply Co.','Vendor','555-0102'],['Sample Contractor Group','Contractor/Vendor','555-0103']],transactions:[['Demo rent payment','Income','Rental Income',2300],['Demo materials purchase','Expense','Materials',875],['Demo labor payment','Expense','Labor / Payroll',1800]],rent:[['2026-06','Oakstone Rental A',2300,'2026-06-08',80],['2026-06','Pinecrest Rental B',1950,'—','Pending']],receipts:[['Demo Supply Co.',875,'Converted'],['Sample Fuel Vendor',74.5,'Needs Review']],audit:[]};function login(){if(p.value!=='demo123')return alert('Password demo incorrecto');role=u.value;gate.classList.add('hidden');app.classList.add('on');rows.audit.unshift([new Date().toLocaleString(),roles[role],'login']);render()}function logout(){app.classList.remove('on');gate.classList.remove('hidden')}function menu(x){document.getElementById('side')?.classList.toggle('open',!!x);cover.classList.toggle('on',!!x)}function go(m){if(!can(m))return alert('Tu rol demo no tiene acceso');page=m;menu(0);render()}function badge(v){let c=/Income|Occupied|Converted|Active/.test(v)?'green':/Expense|Needs/.test(v)?'red':/Planning|Progress|Rehab|Pending/.test(v)?'amber':'blue';return `<span class="badge ${c}">${v}</span>`}function table(h,r){return `<div class="table"><table><thead><tr>${h.map(x=>`<th>${x}</th>`).join('')}</tr></thead><tbody>${r.map(a=>`<tr>${a.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div><div class="mlist">${r.map(a=>`<div class="item"><b>${a[0]}</b><span>${a.slice(1).join(' · ')}</span></div>`).join('')}</div>`}function head(t,s){return `<div class="head"><div><div class="k">N&J Command Center</div><h1>${t}</h1><p class="sub">${s}</p></div><div class="actions"><button class="btn" onclick="logout()">Salir</button></div></div>`}function shell(c){let nav=[['dashboard','📊 Dashboard'],['properties','🏠 Properties'],['projects','🔨 Projects'],['contacts','👥 Contacts'],['transactions','💵 Transactions'],['rent','⏰ Rent'],['receipts','🧾 Receipts'],['reports','📈 Reports'],['security','🛡️ Security'],['audit','📋 Audit']];return `<aside id="side" class="side"><div class="brand"><div class="logo"></div><b>N&J Command Center</b><small>${roles[role]}</small></div><nav class="nav">${nav.map(n=>`<button class="${page==n[0]?'active':''} ${can(n[0])?'':'locked'}" onclick="go('${n[0]}')">${n[1]}</button>`).join('')}</nav><div class="foot">Datos ficticios · PIN 2468</div></aside><div class="top"><div class="top-left"><button class="btn hamb" onclick="menu(1)">☰</button><div class="logo"></div><b>N&J</b></div><button class="btn" onclick="logout()">Salir</button></div><main class="main">${c}</main>`}function render(){let inc=2300,exp=2675,html='';if(page==='dashboard')html=head('Dashboard inteligente','Alimentado por datos ficticios y protegido por roles demo.')+`<div class="grid c4"><div class="card stat"><div class="label">Income</div><div class="value green">${money(inc)}</div></div><div class="card stat"><div class="label">Expenses</div><div class="value redtxt">${money(exp)}</div></div><div class="card stat"><div class="label">Net</div><div class="value redtxt">${money(inc-exp)}</div></div><div class="card stat"><div class="label">Role</div><div class="value blue">${role}</div></div></div><div class="grid c2" style="margin-top:15px"><div class="card"><h3>P&L by property</h3>${table(['Property','Income','Expenses','Net'],[['Oakstone Rental A',money(2300),money(2675),money(-375)],['Pinecrest Rental B','$0','$0','$0'],['Sample Ridge Flip','$0','$0','$0']])}</div><div class="card"><h3>Project stages</h3><div class="grid c2"><div class="item"><b>1</b><span>Planning</span></div><div class="item"><b>1</b><span>In Progress</span></div></div></div></div>`;if(page==='properties')html=head('Properties','Registros falsos con relaciones opcionales.')+`<div class="card">${table(['Name','Type','Status','Rent'],rows.properties.map(x=>[x[0],x[1],badge(x[2]),money(x[3])]))}</div>`;if(page==='projects')html=head('Projects','Etapas y presupuestos demo.')+`<div class="card">${table(['Name','Stage','Property','Budget'],rows.projects.map(x=>[x[0],badge(x[1]),x[2],money(x[3])]))}</div>`;if(page==='contacts')html=head('Contacts','Contactos 100% ficticios.')+`<div class="card">${table(['Name','Role','Phone'],rows.contacts)}</div>`;if(page==='transactions')html=head('Transactions','Base del P&L demo.')+`<div class="card">${table(['Description','Type','Category','Amount'],rows.transactions.map(x=>[x[0],badge(x[1]),x[2],money(x[3])]))}</div>`;if(page==='rent')html=head('Rent & Late Fees','Late fees demo: inicial + diario.')+`<div class="card">${table(['Month','Property','Rent','Paid','Fee'],rows.rent.map(x=>[x[0],x[1],money(x[2]),x[3],money(x[4])]))}</div>`;if(page==='receipts')html=head('Receipts','Inbox demo de recibos.')+`<div class="card">${table(['Vendor','Amount','Status'],rows.receipts.map(x=>[x[0],money(x[1]),badge(x[2])]))}</div>`;if(page==='reports')html=head('Reports','Resumen demo para revisión móvil.')+`<div class="grid c3"><div class="card stat"><div class="label">Income</div><div class="value green">${money(inc)}</div></div><div class="card stat"><div class="label">Expenses</div><div class="value redtxt">${money(exp)}</div></div><div class="card stat"><div class="label">Net</div><div class="value redtxt">${money(inc-exp)}</div></div></div>`;if(page==='security')html=head('Security demo','Simula login, roles y PIN; seguridad real será V6.0.')+`<div class="grid c3"><div class="card"><h3>Login</h3><p class="sub">Usuarios demo por rol.</p></div><div class="card"><h3>PIN</h3><p class="sub">PIN demo: 2468.</p></div><div class="card"><h3>V6.0</h3><p class="sub">Backend + base de datos.</p></div></div>`;if(page==='audit')html=head('Audit log','Acciones locales demo.')+`<div class="card">${table(['Date','Role','Action'],rows.audit)}</div>`;app.innerHTML=shell(html)}
</script></body></html>
